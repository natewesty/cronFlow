version: 2

sources:
  - name: raw
    description: "Raw data from Commerce7 API"
    schema: "{{ var('raw_schema', 'public') }}"
    tables:
      - name: raw_customer
        description: "Raw customer data from Commerce7 API"
        columns:
          - name: id
            description: "Primary key"
            tests:
              - unique
              - not_null
          - name: data
            description: "JSONB data from API"
          - name: last_processed_at
            description: "Timestamp of last processing"
          - name: created_at
            description: "Record creation timestamp"
          - name: updated_at
            description: "Record update timestamp"
            
      - name: raw_order
        description: "Raw order data from Commerce7 API"
        columns:
          - name: id
            description: "Primary key"
            tests:
              - unique
              - not_null
          - name: data
            description: "JSONB data from API"
          - name: last_processed_at
            description: "Timestamp of last processing"
          - name: created_at
            description: "Record creation timestamp"
          - name: updated_at
            description: "Record update timestamp"
            
      - name: raw_product
        description: "Raw product data from Commerce7 API"
        columns:
          - name: id
            description: "Primary key"
            tests:
              - unique
              - not_null
          - name: data
            description: "JSONB data from API"
          - name: last_processed_at
            description: "Timestamp of last processing"
          - name: created_at
            description: "Record creation timestamp"
          - name: updated_at
            description: "Record update timestamp"
            
      - name: raw_club_membership
        description: "Raw club membership data from Commerce7 API"
        columns:
          - name: id
            description: "Primary key"
            tests:
              - unique
              - not_null
          - name: data
            description: "JSONB data from API"
          - name: last_processed_at
            description: "Timestamp of last processing"
          - name: created_at
            description: "Record creation timestamp"
          - name: updated_at
            description: "Record update timestamp"
            
      - name: raw_tock_guest
        description: "Raw guest data from Tock API"
        columns:
          - name: id
            description: "Primary key"
            tests:
              - unique
              - not_null
          - name: data
            description: "JSONB data from API"
          - name: last_processed_at
            description: "Timestamp of last processing"
          - name: _airbyte_ab_id
            description: "Airbyte record ID"
          - name: _airbyte_emitted_at
            description: "Airbyte emission timestamp"
          - name: _airbyte_normalized_at
            description: "Airbyte normalization timestamp"
          - name: _airbyte_tock_guest_hashid
            description: "Airbyte hash ID"
            
      - name: raw_tock_reservation
        description: "Raw reservation data from Tock API"
        columns:
          - name: id
            description: "Primary key"
            tests:
              - unique
              - not_null
          - name: data
            description: "JSONB data from API"
          - name: last_processed_at
            description: "Timestamp of last processing"
          - name: _airbyte_ab_id
            description: "Airbyte record ID"
          - name: _airbyte_emitted_at
            description: "Airbyte emission timestamp"
          - name: _airbyte_normalized_at
            description: "Airbyte normalization timestamp"
          - name: _airbyte_tock_reservation_hashid
            description: "Airbyte hash ID"

  - name: manual
    description: "User-maintained mapping tables, written by the dashboard app (not dbt-managed)"
    schema: "{{ var('raw_schema', 'public') }}"
    tables:
      - name: experience_attribution
        description: "Tock experience -> attribution group, maintained via the dashboard Inputs Manager"
        columns:
          - name: experience
            description: "Tock experience name (primary key)"
            tests:
              - unique
              - not_null
          - name: attribution
            description: "Attribution group (Tasting Room, Club, Event, No Pay)"
            tests:
              - not_null
          - name: updated_by
            description: "Dashboard user who set the attribution"
          - name: updated_at
            description: "When the attribution was last changed" 